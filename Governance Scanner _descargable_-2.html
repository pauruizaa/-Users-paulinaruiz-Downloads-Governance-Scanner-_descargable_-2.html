  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"es\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Governance Readiness Kit · Bluebox<\u002Ftitle>\n<style>/* =========================================================================\n   Bluebox · Design System · Colors & Type\n   -------------------------------------------------------------------------\n   Source of truth for CSS variables. Import this file first:\n     <link rel=\"stylesheet\" href=\"/colors_and_type.css\" />\n\n   Based on \"10 Conceptos fundamentales de nuestra marca gráfica\" (Bluebox).\n   Brand rationale (quoted concepts):\n     · Somos una caja azul que transforma el mundo.\n     · Sencillo y claro. Preferimos no complicar la lectura con texturas.\n     · Diversa: 12 colores bien seleccionados.\n     · Los módulos son bonitos — cuando se usan de manera equilibrada.\n   ========================================================================= */\n\n/* -------------------------------------------------------------------------\n   1. PALETA PRINCIPAL (Principal palette — for general moments)\n   Sampled directly from the brand icon swatches. These are the hero colors.\n   ------------------------------------------------------------------------- */\n:root {\n  /* Blue is the heart of the brand — \"somos una caja azul\" */\n  --bb-azul:         #417dd5;   /* Primary blue */\n  --bb-azul-marino: #005fa9;    /* Navy / deep blue */\n  --bb-verde-azul:  #055151;    /* Teal (Verde Azul) */\n  --bb-verde:       #064325;    /* Deep forest green */\n\n  /* Warm side */\n  --bb-amarillo:    #f2bd3a;    /* Yellow */\n  --bb-naranja:     #f87c04;    /* Orange */\n  --bb-rojo:        #e85445;    /* Coral red */\n  --bb-rosa:        #ed99bd;    /* Pink */\n\n  /* Neutrals */\n  --bb-negro:       #000000;\n  --bb-blanco:      #ffffff;\n\n  /* Extended neutrals (inferred — a \"limpio y claro\" system needs greys) */\n  --bb-gris-900:    #0b0b0b;\n  --bb-gris-700:    #2a2a2a;\n  --bb-gris-500:    #6b6b6b;\n  --bb-gris-300:    #c9c9c9;\n  --bb-gris-200:    #e5e5e5;\n  --bb-gris-100:    #f2f2f2;\n  --bb-gris-50:     #fafafa;\n}\n\n/* -------------------------------------------------------------------------\n   2. PALETA TENUE (Muted palette — for gradients + soft backgrounds)\n   \"Los mismos colores pero tenues, para creación de degradados.\"\n   Derived from the principal palette at ~30% saturation / higher lightness.\n   ------------------------------------------------------------------------- */\n:root {\n  --bb-azul-tenue:         #b9cef0;\n  --bb-azul-marino-tenue:  #a3bed9;\n  --bb-verde-azul-tenue:   #9cc0c0;\n  --bb-verde-tenue:        #a9c5b5;\n  --bb-amarillo-tenue:     #f8e0a3;\n  --bb-naranja-tenue:      #fbcc9a;\n  --bb-rojo-tenue:         #f4b8b0;\n  --bb-rosa-tenue:         #f7d5e3;\n}\n\n/* -------------------------------------------------------------------------\n   3. PALETA NEÓN (Neon palette — EXCLUSIVE to stickers + ecosystem circles)\n   \"Exclusiva para stickers de señalamiento y círculos de ecosistema.\"\n   Do NOT use for general type, backgrounds, or UI chrome.\n   ------------------------------------------------------------------------- */\n:root {\n  --bb-neon-azul:      #2ea8ff;\n  --bb-neon-verde:     #21e26f;\n  --bb-neon-amarillo:  #ffe33d;\n  --bb-neon-naranja:   #ff9a1f;\n  --bb-neon-rojo:      #ff5b4a;\n  --bb-neon-rosa:      #ff6ad5;\n}\n\n/* -------------------------------------------------------------------------\n   4. SEMANTIC TOKENS\n   Most UI code should reference THESE, not the raw palette above.\n   Flip a handful here to rethemeв the whole system.\n   ------------------------------------------------------------------------- */\n:root {\n  /* Surfaces */\n  --bb-bg:          var(--bb-blanco);\n  --bb-bg-subtle:   var(--bb-gris-50);\n  --bb-bg-muted:    var(--bb-gris-100);\n  --bb-surface:     var(--bb-blanco);\n  --bb-surface-ink: var(--bb-negro);   /* dark surface for inverted sections */\n\n  /* Foreground / ink */\n  --bb-fg:          var(--bb-negro);\n  --bb-fg-muted:    var(--bb-gris-700);\n  --bb-fg-subtle:   var(--bb-gris-500);\n  --bb-fg-on-ink:   var(--bb-blanco);\n\n  /* Brand + accents */\n  --bb-brand:          var(--bb-azul);\n  --bb-brand-strong:   var(--bb-azul-marino);\n  --bb-brand-ink:      var(--bb-verde);   /* secondary brand ink */\n  --bb-accent-warm:    var(--bb-naranja);\n  --bb-accent-warning: var(--bb-amarillo);\n  --bb-accent-danger:  var(--bb-rojo);\n  --bb-accent-soft:    var(--bb-rosa);\n\n  /* Borders + dividers */\n  --bb-border:        var(--bb-gris-200);\n  --bb-border-strong: var(--bb-gris-300);\n  --bb-border-ink:    var(--bb-negro);\n\n  /* Focus */\n  --bb-focus-ring: color-mix(in oklch, var(--bb-azul) 60%, transparent);\n}\n\n/* -------------------------------------------------------------------------\n   5. TYPOGRAPHY\n   Brand spec: \"SF UI Display Font. Tipografía recta y redondita.\n                Somos amables y profesionales.\"\n   We use Apple's SF Pro via the system stack, falling back to Mulish\n   (a close rounded-humanist Google Font) and then system-ui.\n   If you have SF Pro font files, drop them in /fonts and this stack picks\n   them up first.\n   ------------------------------------------------------------------------- */\n/* SF UI Display — official Bluebox brand font (files in /fonts) */\n@font-face { font-family: \"SF UI Display\"; font-display: swap; font-weight: 100; src: url(\"04a4314b-5570-445a-9c38-fcdd7a183661\") format(\"opentype\"); }\n@font-face { font-family: \"SF UI Display\"; font-display: swap; font-weight: 200; src: url(\"1d18ff5f-6b16-41df-bb68-bae6c248107e\") format(\"opentype\"); }\n@font-face { font-family: \"SF UI Display\"; font-display: swap; font-weight: 300; src: url(\"59a8a20e-5330-4609-aac9-f3d096a28b21\") format(\"truetype\"); }\n@font-face { font-family: \"SF UI Display\"; font-display: swap; font-weight: 400; src: url(\"86be21ca-1711-4150-bd91-52487eb14ec0\") format(\"opentype\"); }\n@font-face { font-family: \"SF UI Display\"; font-display: swap; font-weight: 500; src: url(\"8ca5c106-046a-44e9-a6eb-46314349381d\") format(\"opentype\"); }\n@font-face { font-family: \"SF UI Display\"; font-display: swap; font-weight: 600; src: url(\"1cde9bec-6f2f-4e9b-be0d-0bddf8e9e32c\") format(\"opentype\"); }\n@font-face { font-family: \"SF UI Display\"; font-display: swap; font-weight: 700; src: url(\"61d2b790-5ad8-4d00-bfc0-70d42ee7f3db\") format(\"truetype\"); }\n@font-face { font-family: \"SF UI Display\"; font-display: swap; font-weight: 800; src: url(\"f53a5995-597b-48c5-9f9a-99ee0b8ee172\") format(\"opentype\"); }\n@font-face { font-family: \"SF UI Display\"; font-display: swap; font-weight: 900; src: url(\"56cda945-bc30-42d6-9c44-4c30e076546e\") format(\"opentype\"); }\n\n:root {\n  --bb-font-display: \"SF UI Display\", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;\n  --bb-font-body:    \"SF UI Display\", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;\n  --bb-font-mono:    \"SF Mono\", \"JetBrains Mono\", ui-monospace, Menlo, monospace;\n\n  /* Weights — Bluebox uses tight, confident weight contrast */\n  --bb-w-regular:  400;\n  --bb-w-medium:   500;\n  --bb-w-semibold: 600;\n  --bb-w-bold:     700;\n  --bb-w-black:    800;\n\n  /* Type scale — 1.2 ratio, tuned for deck + UI dual-use */\n  --bb-t-display:  clamp(48px, 7.2vw, 96px);\n  --bb-t-h1:       clamp(36px, 4.2vw, 56px);\n  --bb-t-h2:       clamp(28px, 3.0vw, 40px);\n  --bb-t-h3:       clamp(22px, 2.2vw, 28px);\n  --bb-t-h4:       20px;\n  --bb-t-body:     16px;\n  --bb-t-small:    14px;\n  --bb-t-micro:    12px;\n  --bb-t-eyebrow:  11px;\n\n  /* Line heights */\n  --bb-lh-tight:   1.05;\n  --bb-lh-snug:    1.2;\n  --bb-lh-normal:  1.4;\n  --bb-lh-relaxed: 1.55;\n\n  /* Letter spacing — SF Pro-style: tight on display, neutral on body */\n  --bb-ls-tight:   -0.02em;\n  --bb-ls-snug:    -0.01em;\n  --bb-ls-normal:   0em;\n  --bb-ls-wide:     0.08em;   /* eyebrow / section labels */\n}\n\n/* Base element defaults — semantic layer */\nhtml {\n  font-family: var(--bb-font-body);\n  font-size: var(--bb-t-body);\n  line-height: var(--bb-lh-relaxed);\n  color: var(--bb-fg);\n  background: var(--bb-bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--bb-font-display);\n  color: var(--bb-fg);\n  margin: 0 0 0.4em;\n  text-wrap: balance;\n}\nh1 { font-size: var(--bb-t-h1); font-weight: var(--bb-w-bold);    line-height: var(--bb-lh-tight); letter-spacing: var(--bb-ls-tight); }\nh2 { font-size: var(--bb-t-h2); font-weight: var(--bb-w-bold);    line-height: var(--bb-lh-snug);  letter-spacing: var(--bb-ls-snug);  }\nh3 { font-size: var(--bb-t-h3); font-weight: var(--bb-w-semibold);line-height: var(--bb-lh-snug);  letter-spacing: var(--bb-ls-snug);  }\nh4 { font-size: var(--bb-t-h4); font-weight: var(--bb-w-semibold);line-height: var(--bb-lh-snug);  }\n\np, li { font-size: var(--bb-t-body); line-height: var(--bb-lh-relaxed); text-wrap: pretty; }\n\nsmall  { font-size: var(--bb-t-small); color: var(--bb-fg-muted); }\ncode, pre, kbd { font-family: var(--bb-font-mono); }\n\n/* Eyebrow / section label — a key Bluebox motif\n   (see: section-rail numbers \"01 02 03\" in the Barra del Enfoque) */\n.bb-eyebrow {\n  font-size: var(--bb-t-eyebrow);\n  font-weight: var(--bb-w-semibold);\n  letter-spacing: var(--bb-ls-wide);\n  text-transform: uppercase;\n  color: var(--bb-fg-subtle);\n}\n\n/* Display — for hero / cover / title slides */\n.bb-display {\n  font-family: var(--bb-font-display);\n  font-size: var(--bb-t-display);\n  font-weight: var(--bb-w-black);\n  line-height: var(--bb-lh-tight);\n  letter-spacing: var(--bb-ls-tight);\n}\n\n/* -------------------------------------------------------------------------\n   6. SPACING / RADIUS / SHADOW / MOTION\n   Bluebox favours clean, unornamented surfaces (\"sin ruido\"), so the shadow\n   system is intentionally light. Radii match the module + sticker language.\n   ------------------------------------------------------------------------- */\n:root {\n  /* 4px base spacing scale */\n  --bb-sp-0: 0;\n  --bb-sp-1: 4px;\n  --bb-sp-2: 8px;\n  --bb-sp-3: 12px;\n  --bb-sp-4: 16px;\n  --bb-sp-5: 24px;\n  --bb-sp-6: 32px;\n  --bb-sp-7: 48px;\n  --bb-sp-8: 64px;\n  --bb-sp-9: 96px;\n\n  /* Radii — modules are subtly rounded; circles are fully round\n     (circles = ecosystem, per brand concept #3) */\n  --bb-r-sm:     6px;\n  --bb-r-md:     12px;\n  --bb-r-lg:     20px;   /* default module radius */\n  --bb-r-xl:     32px;\n  --bb-r-pill:   999px;\n  --bb-r-circle: 50%;\n\n  /* Borders */\n  --bb-stroke-1: 1px;\n  --bb-stroke-2: 2px;\n  --bb-stroke-3: 4px;   /* used on the \"Barra del Enfoque\" rail */\n\n  /* Shadows — minimal; Bluebox tends to use flat fills + thin strokes */\n  --bb-sh-0:  none;\n  --bb-sh-1:  0 1px 2px rgba(0,0,0,.06);\n  --bb-sh-2:  0 4px 14px rgba(0,0,0,.08);\n  --bb-sh-3:  0 12px 32px rgba(0,0,0,.12);\n  --bb-sh-focus: 0 0 0 3px var(--bb-focus-ring);\n\n  /* Motion */\n  --bb-ease:         cubic-bezier(.2, .7, .2, 1);\n  --bb-ease-smooth:  cubic-bezier(.4, 0, .2, 1);\n  --bb-dur-fast:     120ms;\n  --bb-dur-base:     200ms;\n  --bb-dur-slow:     320ms;\n}\n\n/* -------------------------------------------------------------------------\n   7. UTILITY: Focus ring (used across buttons, inputs, links)\n   ------------------------------------------------------------------------- */\n:focus-visible {\n  outline: none;\n  box-shadow: var(--bb-sh-focus);\n  border-radius: var(--bb-r-sm);\n}\n<\u002Fstyle>\n<style>\n/* ──────────────────────────────────────────────────────────────────────────\n   Governance Scanner — Bluebox visual identity\n   Light, modular, colorful. Module grid + circles + flat color fields.\n   ────────────────────────────────────────────────────────────────────────── */\n\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body { height: 100%; }\nbody {\n  font-family: var(--bb-font-body);\n  background: var(--bb-blanco);\n  color: var(--bb-fg);\n  -webkit-font-smoothing: antialiased;\n  overflow-x: hidden;\n  font-size: 16px;\n  line-height: var(--bb-lh-relaxed);\n}\n#app { width: 100%; min-height: 100vh; }\nbutton { font-family: inherit; cursor: pointer; }\nem { font-style: italic; }\n\n/* per-dimension color hooks */\n.dim-P1 { --d: var(--bb-azul);     --d-ink: #fff; --d-tenue: var(--bb-azul-tenue); }\n.dim-P2 { --d: var(--bb-naranja);  --d-ink: #fff; --d-tenue: var(--bb-naranja-tenue); }\n.dim-P3 { --d: var(--bb-verde);    --d-ink: #fff; --d-tenue: var(--bb-verde-tenue); }\n.dim-P4 { --d: var(--bb-rosa);     --d-ink: #000; --d-tenue: var(--bb-rosa-tenue); }\n\n/* ── BARRA DEL ENFOQUE (topbar + section rail) ── */\n.bb-bar {\n  position: sticky; top: 0; z-index: 60;\n  background: var(--bb-blanco);\n  border-bottom: var(--bb-stroke-1) solid var(--bb-border);\n  height: 64px;\n  padding: 0 32px;\n  display: flex; align-items: center; gap: 24px;\n}\n.bb-bar .wordmark {\n  display: inline-flex; align-items: center;\n  height: 28px;\n}\n.bb-bar .wordmark img {\n  height: 100%;\n  width: auto;\n  display: block;\n}\n.bb-bar .divider { width: 1px; height: 26px; background: var(--bb-border); }\n.bb-bar .crumbs {\n  display: flex; align-items: center; gap: 14px;\n  font-size: 12px;\n  color: var(--bb-fg-subtle);\n  font-weight: var(--bb-w-medium);\n}\n.bb-bar .crumbs .eyebrow {\n  font-size: 10px;\n  font-weight: var(--bb-w-bold);\n  letter-spacing: var(--bb-ls-wide);\n  text-transform: uppercase;\n  color: var(--bb-fg-subtle);\n}\n.bb-bar .crumbs .here {\n  color: var(--bb-fg);\n  font-weight: var(--bb-w-semibold);\n  font-size: 13px;\n  letter-spacing: -0.01em;\n}\n.bb-bar .focus-steps {\n  margin-left: auto;\n  display: flex; align-items: center; gap: 0;\n}\n.bb-bar .fs {\n  font-family: var(--bb-font-mono);\n  font-size: 12px;\n  font-weight: var(--bb-w-bold);\n  color: var(--bb-border-strong);\n  padding: 6px 12px;\n  letter-spacing: 0.04em;\n  position: relative;\n}\n.bb-bar .fs.done { color: var(--bb-fg-subtle); }\n.bb-bar .fs.active { color: var(--bb-azul-marino); }\n.bb-bar .fs.active::after {\n  content: \"\"; position: absolute;\n  left: 8px; right: 8px; bottom: -22px;\n  height: var(--bb-stroke-3);\n  background: var(--bb-azul);\n  border-radius: 2px;\n}\n.bb-bar .top-cta {\n  background: transparent;\n  border: var(--bb-stroke-1) solid var(--bb-border-strong);\n  color: var(--bb-fg);\n  padding: 8px 16px;\n  border-radius: var(--bb-r-pill);\n  font-size: 12px;\n  font-weight: var(--bb-w-semibold);\n  transition: background var(--bb-dur-fast) var(--bb-ease), border-color var(--bb-dur-fast) var(--bb-ease);\n}\n.bb-bar .top-cta:hover { background: var(--bb-bg-subtle); border-color: var(--bb-fg); }\n\n/* ── BUTTONS ── */\n.bb-btn {\n  display: inline-flex; align-items: center; gap: 10px;\n  background: var(--bb-azul-marino);\n  color: var(--bb-blanco);\n  border: none;\n  border-radius: var(--bb-r-md);\n  padding: 14px 28px;\n  font-family: var(--bb-font-body);\n  font-size: 15px;\n  font-weight: var(--bb-w-semibold);\n  letter-spacing: -0.005em;\n  transition: background var(--bb-dur-fast) var(--bb-ease), transform var(--bb-dur-fast) var(--bb-ease);\n}\n.bb-btn:hover { background: #00477f; }\n.bb-btn:active { transform: translateY(1px); }\n.bb-btn svg { stroke-width: 2.5; }\n.bb-btn.ghost {\n  background: transparent;\n  color: var(--bb-azul-marino);\n  border: var(--bb-stroke-1) solid var(--bb-border-strong);\n  padding: 13px 26px;\n}\n.bb-btn.ghost:hover { background: var(--bb-bg-subtle); border-color: var(--bb-azul-marino); }\n\n/* ──────────────────────────────────────────────────────────────────────\n   COVER PAGE\n   ────────────────────────────────────────────────────────────────────── */\n.cover {\n  padding: 56px 32px 80px;\n  max-width: 1200px;\n  margin: 0 auto;\n}\n.cover-eyebrow {\n  font-size: 11px;\n  font-weight: var(--bb-w-bold);\n  letter-spacing: var(--bb-ls-wide);\n  text-transform: uppercase;\n  color: var(--bb-azul-marino);\n  display: inline-flex; align-items: center; gap: 10px;\n  margin-bottom: 28px;\n}\n.cover-eyebrow::before {\n  content: \"\"; display: block;\n  width: 28px; height: var(--bb-stroke-2);\n  background: var(--bb-azul);\n}\n.cover-title {\n  font-family: var(--bb-font-display);\n  font-size: clamp(48px, 7.6vw, 104px);\n  font-weight: var(--bb-w-black);\n  line-height: 0.95;\n  letter-spacing: -0.035em;\n  color: var(--bb-negro);\n  max-width: 1000px;\n  margin-bottom: 24px;\n  text-wrap: balance;\n}\n.cover-title em {\n  font-weight: var(--bb-w-regular);\n  color: var(--bb-azul-marino);\n  font-style: normal;\n  display: block;\n}\n.cover-title .dot { color: var(--bb-azul); }\n.cover-sub {\n  font-size: 19px;\n  font-weight: var(--bb-w-regular);\n  color: var(--bb-fg-muted);\n  max-width: 560px;\n  line-height: 1.55;\n  margin-bottom: 56px;\n  text-wrap: pretty;\n}\n.cover-sub strong { color: var(--bb-negro); font-weight: var(--bb-w-semibold); }\n\n/* Module grid for cover stats — Bluebox signature */\n.mod-grid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 12px;\n  margin-bottom: 64px;\n}\n.mod {\n  border-radius: var(--bb-r-lg);\n  padding: 28px 24px;\n  color: var(--bb-blanco);\n  min-height: 150px;\n  display: flex; flex-direction: column; justify-content: space-between;\n  position: relative; overflow: hidden;\n}\n.mod-azul       { background: var(--bb-azul); }\n.mod-naranja    { background: var(--bb-naranja); }\n.mod-verde      { background: var(--bb-verde); }\n.mod-rosa       { background: var(--bb-rosa); color: var(--bb-negro); }\n.mod-amarillo   { background: var(--bb-amarillo); color: var(--bb-negro); }\n.mod-verde-azul { background: var(--bb-verde-azul); }\n.mod-marino     { background: var(--bb-azul-marino); }\n.mod-blanco     { background: var(--bb-blanco); color: var(--bb-negro); border: var(--bb-stroke-1) solid var(--bb-border); }\n.mod-n {\n  font-family: var(--bb-font-display);\n  font-size: 56px;\n  font-weight: var(--bb-w-black);\n  line-height: 0.9;\n  letter-spacing: -0.04em;\n}\n.mod-n .unit { font-size: 22px; font-weight: var(--bb-w-medium); letter-spacing: -0.01em; opacity: 0.7; margin-left: 4px; }\n.mod-label {\n  font-size: 12px;\n  font-weight: var(--bb-w-semibold);\n  letter-spacing: 0.02em;\n  text-transform: lowercase;\n  opacity: 0.92;\n}\n\n/* form */\n.cover-form-wrap {\n  display: grid;\n  grid-template-columns: 280px 1fr;\n  gap: 48px;\n  align-items: start;\n  margin-bottom: 24px;\n}\n.cover-form-aside {\n  position: sticky; top: 96px;\n}\n.cover-form-aside .eyebrow {\n  font-size: 11px;\n  font-weight: var(--bb-w-bold);\n  letter-spacing: var(--bb-ls-wide);\n  text-transform: uppercase;\n  color: var(--bb-azul-marino);\n  display: inline-flex; align-items: center; gap: 10px;\n  margin-bottom: 16px;\n}\n.cover-form-aside .eyebrow::before {\n  content: \"\"; display: block;\n  width: 24px; height: var(--bb-stroke-2);\n  background: var(--bb-naranja);\n}\n.cover-form-aside h2 {\n  font-family: var(--bb-font-display);\n  font-size: 32px;\n  font-weight: var(--bb-w-bold);\n  line-height: 1.05;\n  letter-spacing: -0.022em;\n  color: var(--bb-negro);\n  margin-bottom: 14px;\n}\n.cover-form-aside p {\n  font-size: 14px;\n  color: var(--bb-fg-muted);\n  line-height: 1.6;\n}\n.cover-form {\n  background: var(--bb-bg-subtle);\n  border-radius: var(--bb-r-lg);\n  padding: 32px;\n}\n.field-row {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 16px;\n  margin-bottom: 16px;\n}\n.field-row:last-child { margin-bottom: 0; }\n.field label {\n  display: block;\n  font-size: 11px;\n  font-weight: var(--bb-w-semibold);\n  letter-spacing: var(--bb-ls-wide);\n  text-transform: uppercase;\n  color: var(--bb-fg-subtle);\n  margin-bottom: 8px;\n}\n.field input, .field select {\n  width: 100%;\n  background: var(--bb-blanco);\n  border: var(--bb-stroke-1) solid va -name { color: var(--bb-fg-subtle); }\n.g-step.current {\n  background: var(--bb-azul);\n  border-color: var(--bb-azul);\n  color: var(--bb-blanco);\n}\n.g-step.current .g-num { background: var(--bb-blanco); color: var(--bb-azul-marino); }\n.g-step.current .g-name { color: var(--bb-blanco); font-weight: var(--bb-w-black); }\n.g-step.current .g-range { color: rgba(255,255,255,0.78); }\n.g-step.future { opacity: 0.6; }\n.g-step.future .g-name { color: var(--bb-border-strong); }\n.g-step.future .g-range { color: var(--bb-border-strong); }\n\n/* insights */\n.ins-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 12px;\n}\n.ins-card {\n  background: var(--bb-blanco);\n  border: var(--bb-stroke-1) solid var(--bb-border);\n  border-radius: var(--bb-r-lg);\n  padding: 32px;\n}\n.ins-card.solid-azul {\n  background: var(--bb-azul-marino);\n  color: var(--bb-blanco);\n  border-color: var(--bb-azul-marino);\n}\n.ins-card.solid-azul .ins-eyebrow { color: rgba(255,255,255,0.7); }\n.ins-card.solid-azul .ins-title { color: var(--bb-blanco); }\n.ins-card.solid-azul .ins-body { color: rgba(255,255,255,0.88); }\n\n.ins-eyebrow {\n  font-size: 11px;\n  font-weight: var(--bb-w-bold);\n  letter-spacing: var(--bb-ls-wide);\n  text-transform: uppercase;\n  color: var(--bb-azul-marino);\n  margin-bottom: 12px;\n}\n.ins-title {\n  font-family: var(--bb-font-display);\n  font-size: 22px;\n  font-weight: var(--bb-w-bold);\n  line-height: 1.1;\n  letter-spacing: -0.018em;\n  color: var(--bb-negro);\n  margin-bottom: 14px;\n  text-wrap: balance;\n}\n.ins-body {\n  font-size: 15px;\n  color: var(--bb-fg-muted);\n  line-height: 1.6;\n  text-wrap: pretty;\n}\n\n.actions {\n  display: flex; flex-direction: column; gap: 14px;\n  margin-top: 6px;\n}\n.action-row {\n  display: flex; align-items: flex-start; gap: 14px;\n  padding: 14px 0;\n  border-bottom: var(--bb-stroke-1) solid var(--bb-border);\n}\n.action-row:last-child { border-bottom: none; }\n.action-num {\n  width: 28px; height: 28px;\n  border-radius: var(--bb-r-circle);\n  background: var(--bb-neon-amarillo);\n  color: var(--bb-negro);\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--bb-font-display);\n  font-weight: var(--bb-w-black);\n  font-size: 13px;\n  flex-shrink: 0;\n}\n.action-row:nth-child(2) .action-num { background: var(--bb-neon-rosa); }\n.action-row:nth-child(3) .action-num { background: var(--bb-neon-verde); }\n.action-row:nth-child(4) .action-num { background: var(--bb-neon-azul); color: var(--bb-blanco); }\n.action-text {\n  font-size: 15px;\n  font-weight: var(--bb-w-medium);\n  color: var(--bb-negro);\n  line-height: 1.5;\n  padding-top: 4px;\n  text-wrap: pretty;\n}\n\n.res-cta {\n  margin-top: 32px;\n  padding: 32px;\n  background: var(--bb-verde);\n  border-radius: var(--bb-r-lg);\n  color: var(--bb-blanco);\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 24px;\n  flex-wrap: wrap;\n}\n.res-cta-text { flex: 1; min-width: 280px; }\n.res-cta-eyebrow {\n  font-size: 11px;\n  font-weight: var(--bb-w-bold);\n  letter-spacing: var(--bb-ls-wide);\n  text-transform: uppercase;\n  color: rgba(255,255,255,0.7);\n  margin-bottom: 6px;\n}\n.res-cta h3 {\n  font-family: var(--bb-font-display);\n  font-size: 26px;\n  font-weight: var(--bb-w-bold);\n  line-height: 1.1;\n  letter-spacing: -0.018em;\n  color: var(--bb-blanco);\n  margin-bottom: 8px;\n  text-wrap: balance;\n}\n.res-cta p {\n  font-size: 14px;\n  color: rgba(255,255,255,0.85);\n  line-height: 1.55;\n  max-width: 480px;\n}\n.res-cta .bb-btn {\n  background: var(--bb-blanco);\n  color: var(--bb-verde);\n}\n.res-cta .bb-btn:hover { background: var(--bb-amarillo); color: var(--bb-negro); }\n\n/* ── RESPONSIVE ── */\n@media (max-width: 900px) {\n  .bb-bar { padding: 0 16px; gap: 14px; }\n  .bb-bar .crumbs .here { display: none; }\n  .bb-bar .focus-steps { display: none; }\n  .cover { padding: 36px 18px 60px; }\n  .mod-grid { grid-template-columns: 1fr 1fr; }\n  .cover-form-wrap { grid-template-columns: 1fr; gap: 24px; }\n  .cover-form-aside { position: static; }\n  .field-row { grid-template-columns: 1fr; }\n  .eval-prog { padding: 12px 16px; }\n  .eval { padding: 32px 16px 40px; }\n  .eval-head { flex-direction: column; gap: 16px; }\n  .eval-head h2 { font-size: 32px; }\n  .scale-row { gap: 5px; }\n  .s-btn { padding: 12px 4px 10px; }\n  .s-btn .sticker { width: 32px; height: 32px; font-size: 14px; }\n  .s-btn .lbl { font-size: 9px; min-height: 22px; }\n  .res-hero { padding: 36px 18px 44px; }\n  .res-hero-inner { grid-template-columns: 1fr; gap: 24px; }\n  .res-arch-card { width: 100%; }\n  .res-body { padding: 32px 18px 60px; }\n  .radar-row { grid-template-columns: 1fr; }\n  .dim-grid { grid-template-columns: 1fr 1fr; }\n  .growth { grid-template-columns: 1fr 1fr; }\n  .ins-grid { grid-template-columns: 1fr; }\n  .cover-cta { flex-direction: column-reverse; align-items: stretch; }\n  .cover-cta .bb-btn { justify-content: center; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div id=\"app\"><\u002Fdiv>\n\n\n\n<script>\n/* ─── DATA ────────────────────────────────────────────────────────────── */\nconst DIMS = [\n  {id:'P1', name:'Alineación de portafolio', short:'Portafolio', cls:'dim-P1', hex:'#417dd5', qs:[\n    {code:'P1.1', text:'Las iniciativas de innovación están directamente conectadas a las prioridades estratégicas del negocio.', hint:'¿Hay mecanismos formales de alineación o depende de conversaciones informales?'},\n    {code:'P1.2', text:'Contamos con criterios claros y conocidos para decidir qué iniciativas merecen tiempo y recursos.', hint:'¿Existe un marco de priorización que todo el equipo conozca?'},\n    {code:'P1.3', text:'Cada iniciativa de innovación tiene un responsable claro desde las áreas de negocio.', hint:'No solo desde el equipo de innovación, sino de quien opera el negocio.'},\n    {code:'P1.4', text:'Operamos la innovación como un portafolio balanceado, no como proyectos aislados.', hint:'¿Existe una vista consolidada de todas las iniciativas activas?'},\n    {code:'P1.5', text:'Las áreas de negocio entienden por qué ciertas iniciativas avanzan y otras no.', hint:'¿Se comunica la lógica de decisión de forma transparente?'},\n  ]},\n  {id:'P2', name:'Modelos de decisión', short:'Decisión', cls:'dim-P2', hex:'#f87c04', qs:[\n    {code:'P2.1', text:'Existen espacios formales y periódicos para revisar, priorizar y tomar decisiones sobre las iniciativas.', hint:'¿Hay comités, rituales o instancias definidas?'},\n    {code:'P2.2', text:'Los sponsors ejecutivos participan activamente en el seguimiento, no solo en la aprobación inicial.', hint:'¿El liderazgo da seguimiento continuo o solo aprueba al inicio?'},\n    {code:'P2.3', text:'Podemos decidir con agilidad si una iniciativa debe continuar, escalar o detenerse.', hint:'¿Cuánto tiempo toma típicamente una decisión de ese tipo?'},\n    {code:'P2.4', text:'Existe claridad sobre quién tiene autoridad para cada tipo de decisión dentro del proceso de innovación.', hint:'¿Los roles de decisión están documentados o son implícitos?'},\n    {code:'P2.5', text:'Las áreas de soporte (TI, Legal, Compras, Finanzas) se involucran desde etapas tempranas para habilitar, no bloquear.', hint:'¿O suelen entrar solo al final como validadores?'},\n  ]},\n  {id:'P3', name:'Sandbox y ejecución', short:'Sandbox', cls:'dim-P3', hex:'#064325', qs:[\n    {code:'P3.1', text:'En nuestra organización es posible experimentar con nuevas soluciones sin seguir todos los procesos estándar.', hint:'¿Existen zonas de excepción o espacios con reglas distintas para pilotos?'},\n    {code:'P3.2', text:'Los pilotos pueden ejecutarse con mayor velocidad que los proyectos operativos regulares.', hint:'¿Hay rutas de aprobación más ágiles para proyectos de innovación?'},\n    {code:'P3.3', text:'Existe una cultura que acepta el aprendizaje a través del error controlado, sin consecuencias negativas.', hint:'¿Se documenta y comparte lo que no funcionó?'},\n    {code:'P3.4', text:'Contamos con acceso a entornos tecnológicos seguros para probar soluciones antes de integrarlas a la operación.', hint:'¿Existen sandboxes, entornos de staging o ambientes de prueba?'},\n    {code:'P3.5', text:'Tenemos claridad sobre cuándo y cómo una iniciativa piloto debe convertirse en parte de la operación regular.', hint:'¿Hay criterios de go/no-go para escalar un piloto?'},\n  ]},\n  {id:'P4', name:'Comunicación estratégica', short:'Comunicación', cls:'dim-P4', hex:'#ed99bd', qs:[\n    {code:'P4.1', text:'La innovación tiene visibilidad regular en los niveles directivos y de liderazgo de la organización.', hint:'¿Hay reportes o presentaciones periódicas al nivel ejecutivo?'},\n    {code:'P4.2', text:'Comunicamos los avances de innovación con métricas de impacto, no solo con reportes de actividades.', hint:'¿La comunicación muestra valor generado o solo qué se hizo?'},\n    {code:'P4.3', text:'Contamos con espacios recurrentes para compartir aprendizajes, casos de éxito y lecciones de proyectos que no funcionaron.', hint:'¿Existen rituales de knowledge-sharing estructurados?'},\n    {code:'P4.4', text:'La forma en que comunicamos la innovación genera alineación y sponsorship — no solo informa.', hint:'¿La comunicación moviliza a las personas o es solo informativa?'},\n    {code:'P4.5', text:'Las personas fuera del equipo de innovación conocen y pueden explicar qué estamos haciendo y por qué importa.', hint:'¿Hay embajadores de innovación en otras áreas?'},\n  ]},\n];\nconst SLBL = [\n  'No existe /\\nMuy informal',\n  'Existe\\nparcialmente',\n  'Opera con\\ninconsistencias',\n  'Funciona\\nestructuradamente',\n  'Maduro y\\nescalable',\n];\nconst ARCHETYPES = [\n  {range:[85,100], name:'Innovador estratégico',         hex:'#064325',\n   desc:'Tu organización opera la innovación como un sistema transversal alineado al negocio. Ese es un activo competitivo real.',\n   strengths:'Existe sponsorship ejecutivo activo, el portafolio está alineado a prioridades estratégicas y los pilotos tienen mecanismos claros de escalamiento.',\n   opportunity:'Consolidar el liderazgo y convertir la innovación en ventaja competitiva sostenible a largo plazo.',\n   actions:['Escalar capacidades a más unidades de negocio.','Construir benchmarks y métricas avanzadas de impacto.','Formalizar playbooks y modelos replicables.','Evolucionar hacia governance intelligence y monitoreo continuo.']},\n  {range:[70,84], name:'Innovador en consolidación',     hex:'#005fa9',\n   desc:'Tienes capacidades habilitadas. El reto es hacerlas más consistentes entre áreas y escalar lo que ya funciona.',\n   strengths:'Existen estructuras y rituales de innovación, hay comités con cierto peso real y algunos pilotos exitosos demuestran que el modelo funciona.',\n   opportunity:'Estandarizar capacidades y reducir la fricción organizacional para escalar consistentemente.',\n   actions:['Formalizar criterios de decisión y el modelo de gobernanza.','Definir ownership y roles claros entre áreas.','Homologar procesos entre unidades de negocio.','Construir mecanismos de seguimiento y accountability.']},\n  {range:[55,69], name:'Innovador con alto potencial',   hex:'#f87c04',\n   desc:'Tienes esfuerzos valiosos en marcha. La oportunidad está en conectarlos y construir la estructura mínima que los haga escalar.',\n   strengths:'Existen iniciativas aisladas con valor real y hay champions que empujan la innovación desde distintas áreas.',\n   opportunity:'Conectar esfuerzos dispersos y construir una estructura mínima de gobernanza que los amplifique.',\n   actions:['Crear un mapa único de iniciativas activas.','Establecer comités ligeros de decisión y seguimiento.','Definir criterios básicos de priorización.','Generar cadencias de comunicación interna sobre innovación.']},\n  {range:[0,54],  name:'Innovador en construcción',      hex:'#e85445',\n   desc:'La innovación en tu organización tiene energía individual. El siguiente paso es convertir esa energía en un sistema.',\n   strengths:'Existe voluntad de innovar — ese es el primer paso y el más difícil. Tienes personas que creen en el proceso.',\n   opportunity:'Construir los fundamentos básicos para habilitar innovación de forma sostenible.',\n   actions:['Definir un mandato inicial de innovación con ownership claro.','Identificar sponsors ejecutivos clave y alinearlos.','Crear espacios mínimos de coordinación y seguimiento.','Establecer quick wins visibles para generar confianza en el modelo.']},\n];\nconst OPEN_QS = [\n  {key:'C1', text:'¿Cuál es hoy la principal fricción que impide que la innovación en tu organización avance más rápido?'},\n  {key:'C2', text:'¿Qué decisión o cambio estructural — si ocurriera mañana — tendría el mayor impacto positivo en tu capacidad de innovar?'},\n  {key:'C3', text:'¿Hay algún proyecto o iniciativa de innovación que sientas que está atrapado sin poder avanzar? ¿Qué lo bloquea?'},\n  {key:'C4', text:'¿Cómo describirías el nivel de apoyo real (no declarativo) que recibe la innovación desde la dirección de tu empresa?'},\n];\n\n/* ─── STATE ───────────────────────────────────────────────────────────── */\nlet page = 'cover';\nlet dimIdx = 0;\nlet answers = {};\nlet openAns = {};\nlet user = {};\n\n/* ─── BARRA DEL ENFOQUE (topbar) ─── */\nfunction topbar() {\n  let here, focusSteps = '';\n  if (page === 'cover') here = 'Bienvenida';\n  else if (page === 'eval') here = DIMS[dimIdx].name;\n  else if (page === 'open') here = 'Reflexión cualitativa';\n  else here = 'Resultados';\n\n  const steps = [\n    {n:'01', label:'Portafolio'},\n    {n:'02', label:'Decisión'},\n    {n:'03', label:'Sandbox'},\n    {n:'04', label:'Comunicación'},\n    {n:'05', label:'Reflexión'},\n    {n:'06', label:'Resultados'},\n  ];\n  let activeIdx = 0;\n  if (page === 'eval') activeIdx = dimIdx;\n  else if (page === 'open') activeIdx = 4;\n  else if (page === 'results') activeIdx = 5;\n\n  focusSteps = steps.map((s, i) => {\n    const cls = i < ac n        <div class=\"mod-n\">15–20<span class=\"unit\">min<\u002Fspan><\u002Fdiv>\n        <div class=\"mod-label\">tiempo estimado<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mod mod-naranja\">\n        <div class=\"mod-n\">20<\u002Fdiv>\n        <div class=\"mod-label\">afirmaciones<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mod mod-verde\">\n        <div class=\"mod-n\">4<\u002Fdiv>\n        <div class=\"mod-label\">dimensiones de gobernanza<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mod mod-rosa\">\n        <div class=\"mod-n\">100<span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"mod-label\">resultado inmediato<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cover-form-wrap\">\n      <aside class=\"cover-form-aside\">\n        <div class=\"eyebrow\">Antes de empezar<\u002Fdiv>\n        <h2>Cuéntanos sobre tu organización.<\u002Fh2>\n        <p>Usamos estos datos sólo para personalizar tu reporte. No los compartimos con nadie.<\u002Fp>\n      <\u002Faside>\n      <div class=\"cover-form\">\n        <div class=\"field-row\">\n          <div class=\"field\"><label>Empresa<\u002Flabel><input id=\"f-empresa\" type=\"text\" placeholder=\"Corporativo XYZ\" value=\"${user.empresa||''}\"><\u002Fdiv>\n          <div class=\"field\"><label>Tu nombre<\u002Flabel><input id=\"f-nombre\" type=\"text\" placeholder=\"Nombre completo\" value=\"${user.nombre||''}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field-row\">\n          <div class=\"field\"><label>Cargo<\u002Flabel><input id=\"f-cargo\" type=\"text\" placeholder=\"Dir. de Innovación\" value=\"${user.cargo||''}\"><\u002Fdiv>\n          <div class=\"field\"><label>Industria<\u002Flabel><input id=\"f-industria\" type=\"text\" placeholder=\"Manufactura, Retail…\" value=\"${user.industria||''}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field-row\">\n          <div class=\"field\"><label>País<\u002Flabel><input id=\"f-pais\" type=\"text\" placeholder=\"México\" value=\"${user.pais||''}\"><\u002Fdiv>\n          <div class=\"field\"><label>¿Área formal de Innovación?<\u002Flabel>\n            <select id=\"f-area\">\n              <option value=\"\">Selecciona…<\u002Foption>\n              <option ${user.area==='Sí, consolidada'?'selected':''}>Sí, consolidada<\u002Foption>\n              <option ${user.area==='Sí, en construcción'?'selected':''}>Sí, en construcción<\u002Foption>\n              <option ${user.area==='No formalmente'?'selected':''}>No formalmente<\u002Foption>\n              <option ${user.area==='No existe'?'selected':''}>No existe<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cover-cta\">\n      <p class=\"cover-note\">No existe respuesta correcta o incorrecta. <strong>Buscamos una lectura honesta de la realidad actual.<\u002Fstrong><\u002Fp>\n      <button class=\"bb-btn\" id=\"btnStart\">\n        Comenzar autoevaluación\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/><polyline points=\"12 5 19 12 12 19\"/><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ─── EVAL ─── */\nfunction renderEval() {\n  const dim = DIMS[dimIdx];\n  const done = Object.values(answers).filter(a => a.score !== null).length;\n  const pct = Math.round(done / 20 * 100);\n  const isLast = dimIdx === DIMS.length - 1;\n\n  const qs = dim.qs.map(q => {\n    const ex = answers[q.code], sel = ex ? ex.score : null;\n    return `<div class=\"q-card ${sel?'answered':''}\" id=\"qc-${q.code}\">\n      <div class=\"q-top\">\n        <span class=\"q-code\">${q.code}<\u002Fspan>\n        <div style=\"flex:1\">\n          <p class=\"q-text\">${q.text}<\u002Fp>\n          <p class=\"q-hint\">${q.hint}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"scale-row\">\n        ${[1,2,3,4,5].map(n => `<button class=\"s-btn ${sel===n?'sel':''}\" data-code=\"${q.code}\" data-score=\"${n}\">\n          <span class=\"sticker ${sel===n?'on':''}\">${n}<\u002Fspan>\n          <span class=\"lbl\">${SLBL[n-1].replace('\\n','<br>')}<\u002Fspan>\n        <\u002Fbutton>`).join('')}\n      <\u002Fdiv>\n      <textarea class=\"q-ta\" data-ta=\"${q.code}\" placeholder=\"Comentario opcional · qué viste, qué sentiste, qué te falta…\" style=\"display:${sel?'block':'none'}\">${ex?ex.comment:''}<\u002Ftextarea>\n    <\u002Fdiv>`;\n  }).join('');\n\n  const dots = DIMS.map((_, i) => `<div class=\"d-dot ${i<dimIdx?'done':i===dimIdx?'active':''}\"><\u002Fdiv>`).join('');\n\n  return `<div class=\"${dim.cls}\">\n    <div class=\"eval-prog\">\n      <span class=\"label\">Progreso<\u002Fspan>\n      <span class=\"count\">${done} / 20<\u002Fspan>\n      <div class=\"track\"><div class=\"fill\" style=\"width:${pct}%;background:${dim.hex}\"><\u002Fdiv><\u002Fdiv>\n      <span class=\"label\" style=\"color:${dim.hex}\">Dimensión ${dimIdx+1} · ${dim.short}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"eval\">\n      <div class=\"eval-head\">\n        <div class=\"dim-badge\"><span class=\"id\">${dim.id}<\u002Fspan><span class=\"of\">${dimIdx+1} de ${DIMS.length}<\u002Fspan><\u002Fdiv>\n        <div class=\"text\">\n          <div class=\"eyebrow\">Dimensión ${dimIdx+1} de ${DIMS.length} · ${dim.short}<\u002Fdiv>\n          <h2>${dim.name}.<\u002Fh2>\n          <p class=\"sub\">Selecciona el puntaje que mejor refleja la realidad de tu organización <strong>hoy<\u002Fstrong>. No el ideal, ni el plan — lo que ya existe.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      ${qs}\n      <div class=\"eval-nav\">\n        <div class=\"dim-dots\">\n          <span>Dimensiones<\u002Fspan>\n          ${dots}\n        <\u002Fdiv>\n        <button class=\"bb-btn\" id=\"btnNext\">\n          ${isLast?'Preguntas finales':'Siguiente dimensión'}\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/><polyline points=\"12 5 19 12 12 19\"/><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ─── OPEN ─── */\nfunction renderOpen() {\n  return `<div>\n    <div class=\"eval-prog\">\n      <span class=\"label\">Progreso<\u002Fspan>\n      <span class=\"count\">20 / 20<\u002Fspan>\n      <div class=\"track\"><div class=\"fill\" style=\"width:100%;background:var(--bb-azul-marino)\"><\u002Fdiv><\u002Fdiv>\n      <span class=\"label\" style=\"color:var(--bb-azul-marino)\">Reflexión cualitativa<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"eval\">\n      <div class=\"eval-head\" style=\"--d:var(--bb-azul-marino);--d-ink:#fff\">\n        <div class=\"dim-badge\"><span class=\"id\" style=\"font-size:18px;text-align:center;letter-spacing:0\">5/5<\u002Fspan><span class=\"of\">cualitativa<\u002Fspan><\u002Fdiv>\n        <div class=\"text\">\n          <div class=\"eyebrow\" style=\"color:var(--bb-azul-marino)\">Reflexión cualitativa<\u002Fdiv>\n          <h2>Cuatro preguntas finales.<\u002Fh2>\n          <p class=\"sub\">No afectan el puntaje. <strong>Responde lo que quieras<\u002Fstrong> — o pasa directo a tus resultados.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      ${OPEN_QS.map((q,i) => `<div class=\"oq-card\">\n        <div class=\"oq-row\">\n          <span class=\"oq-sticker\">${q.key}<\u002Fspan>\n          <p class=\"oq-text\">${q.text}<\u002Fp>\n        <\u002Fdiv>\n        <textarea class=\"q-ta\" data-open=\"${i}\" placeholder=\"Escribe tu reflexión…\" rows=\"3\">${openAns[i]||''}<\u002Ftextarea>\n      <\u002Fdiv>`).join('')}\n      <div class=\"eval-nav\">\n        <span style=\"font-size:13px;color:var(--bb-fg-subtle)\">Casi listo. Tus resultados están a un click.<\u002Fspan>\n        <button class=\"bb-btn\" id=\"btnNext\">\n          Ver mis resultados\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/><polyline points=\"12 5 19 12 12 19\"/><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ─── RESULTS ─── */\nfunction renderResults() {\n  const dimScores = DIMS.map(d => ({...d, score: d.qs.reduce((s,q) => s+(answers[q.code]?.score||0), 0), max: 25}));\n  const gri = dimScores.reduce((s,d) => s+d.score, 0);\n  const arch = ARCHETYPES.find(a => gri>=a.range[0] && gri<=a.range[1]) || ARCHETYPES[3];\n\n  const dimCards = dimScores.map(d => {\n    const pct = Math.round(d.score/d.max*100);\n    const reading = pct>=80 ? 'Fortaleza' : pct>=60 ? 'En desarrollo' : pct>=40 ? 'Brecha importante' : 'Área crítica';\n    return `<div class=\"dc ${d.cls}\">\n      <div class=\"dc-head\">\n        <span class=\"dc-id\">${d.id} · ${d.short}<\u002Fspan>\n        <span class=\"dc-reading\">${reading}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"dc-name\">${d.name}.<\u002Fdiv>\n      <div class=\"dc-bar\"><div class=\"dc-bar-fill\" style=\"width:${pct}%\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"dc-score\">\n        <span class=\"dc-score-n\">${d.score}<\u002Fspan>\n        <span class=\"dc-score-max\">/ 25 pts<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n\n  const legend = dimScores.map(d => `<div class=\"legend-item\">\n    <div class=\"legend-dot\" style=\"background:${d.hex}\"><\u002Fdiv>\n    <div class=\"legend-name\">${d.short}<\u002Fdiv>\n    <div class=\"legend-score\">${d.score}/25<\u002Fdiv>\n  <\u002Fdiv>`).join('');\n\n  const levels = [\n    {name:'Innovador en construcción',   range:'< 55',   lvl:1},\n    {name:'Innovador con alto potencial', range:'55–69', lvl:2},\n    {name:'Innovador en consolidación',   range:'70–84', lvl:3},\n    {name:'Innovador estratégico',        range:'85–100',lvl:4},\n  ];\n  const cur = gri<55?1:gri<70?2:gri<85?3:4;\n  const track = levels.map(l => {\n    const cls = l.lvl===cur?'current':l.lvl<cur?'past':'future';\n    return `<div class=\"g-step ${cls}\">\n      <div class=\"g-num\">${l.lvl}<\u002Fdiv>\n      <div>\n        <div class=\"g-name\">${l.name}<\u002Fdiv>\n        <div class=\"g-range\" style=\"margin-top:6px\">${l.range}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n\n  return `<div>\n    <div class=\"res-hero\" style=\"--arch-c:${arch.hex}\">\n      <div class=\"res-hero-inner\">\n        <div>\n          <div class=\"eyebrow\">Tu Governance Readiness Index<\u002Fdiv>\n          <div class=\"res-company\">${user.empresa?`<strong>${user.empresa}<\u002Fstrong>`:'Tu organización'}${user.nombre?` · ${user.nombre}`:''}${user.cargo?` · ${user.cargo}`:''}<\u002Fdiv>\n          <div class=\"res-score-block\">\n            <div class=\"res-score-num\">${gri}<\u002Fdiv>\n            <div class=\"res-score-meta\">\n              <span class=\"gri-label\">GRI · 2026<\u002Fspan>\n              de 100 pts<br>\n              ${user.industria||'—'} · ${user.pais||'LATAM'}\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"res-arch-card\" style=\"--arch-c:${arch.hex}\">\n          <div class=\"res-arch-eyebrow\">Arquetipo<\u002Fdiv>\n          <div class=\"res-arch-name\" style=\"color:${arch.hex}\">${arch.name}.<\u002Fdiv>\n          <p class=\"res-arch-desc\">${arch.desc}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"res-body\">\n      <div class=\"rs-block\">\n        <div class=\"rs-kicker\">Perfil por pregunta<\u002Fdiv>\n        <div class=\"radar-row\">\n          <div class=\"radar-box\">\n            <canvas id=\"radarCanvas\" width=\"480\" height=\"480\" style=\"max-width:100%;height:auto\"><\u002Fcanvas>\n          <\u002Fdiv>\n          <div class=\"radar-legend\">\n            <h3>Lectura por dimensión<\u002Fh3>\n            ${legend}\n            <p style=\"margin-top:16px;font-size:12px;color:var(--bb-fg-subtle);line-height:1.55\">Cada eje del radar representa una de las 20 afirmaciones. Más cerca del borde = mayor madurez.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rs-block\">\n        <div class=\"rs-kicker\">Resultados por dimensión<\u002Fdiv>\n        <div class=\"dim-grid\">${dimCards}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rs-block\">\n        <div class=\"rs-kicker\">Tu ruta de crecimiento<\u002Fdiv>\n        <div class=\"growth\">${track}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rs-block\">\n        <div class=\"rs-kicker\">Lectura ejecutiva<\u002Fdiv>\n        <div class=\"ins-grid\">\n          <div class=\"ins-card\">\n            <div class=\"ins-eyebrow\">Lo que estás haciendo bien<\u002Fdiv>\n            <div class=\"ins-title\">Fortalezas a capitalizar.<\u002Fdiv>\n            <p class=\"ins-body\">${arch.strengths}<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"ins-card solid-azul\">\n            <div class=\"ins-eyebrow\">Tu principal oportunidad<\u002Fdiv>\n            <div class=\"ins-title\">Por dónde empezar.<\u002Fdiv>\n            <p class=\"ins-body\">${arch.opportunity}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rs-block\">\n        <div class=\"rs-kicker\">Primeros pasos concretos<\u002Fdiv>\n        <div class=\"ins-card\">\n          <div class=\"actions\">\n            ${arch.actions.map((a,i) => `<div class=\"action-row\">\n              <span class=\"action-num\">${i+1}<\u002Fspan>\n              <p class=\"action-text\">${a}<\u002Fp>\n            <\u002Fdiv>`).join('')}\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"res-cta\">\n        <div class=\"res-cta-text\">\n          <div class=\"res-cta-eyebrow\">¿Y ahora?<\u002Fdiv>\n          <h3>Conversemos sobre tu siguiente paso.<\u002Fh3>\n          <p>Si quieres profundizar en este diagnóstico con nuestro equipo, agendemos una sesión de 30 minutos para revisar tus resultados y construir un plan concreto.<\u002Fp>\n        <\u002Fdiv>\n        <button class=\"bb-btn\">\n          Agendar sesión con Bluebox\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"/><polyline points=\"12 5 19 12 12 19\"/><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ─── RENDER ─── */\nfunction render() {\n  const app = document.getElementById('app');\n  let body = '';\n  if (page === 'cover')   body = renderCover();\n  else if (page === 'eval')    body = renderEval();\n  else if (page === 'open')    body = renderOpen();\n  else if (page === 'results') body = renderResults();\n  app.innerHTML = topbar() + body;\n  bindEvents();\n  window.scrollTo({top: 0, behavior: 'instant'});\n}\n\n/* ─── EVENTS ─── */\nfunction bindEvents() {\n  const btnStart = document.getElementById('btnStart');\n  if (btnStart) btnStart.addEventListener('click', () => {\n    user = {\n      empresa:   document.getElementById('f-empresa').value || 'Tu organización',\n      nombre:    document.getElementById('f-nombre').value || '',\n      cargo:     document.getElementById('f-cargo').value || '',\n      industria: document.getElementById('f-industria').value || '',\n      pais:      document.getElementById('f-pais').value || '',\n      area:      document.getElementById('f-area').value || '',\n    };\n    dimIdx = 0; answers = {}; openAns = {};\n    page = 'eval'; render();\n  });\n\n  const btnRestart = document.getElementById('btnRestart');\n  if (btnRestart) btnRestart.addEventListener('click', () => { page='cover'; render(); });\n\n  const btnNext = document.getElementById('btnNext');\n  if (btnNext) btnNext.addEventListener('click', () => {\n    if (page === 'eval') {\n      if (dimIdx < DIMS.length - 1) { dimIdx++; }\n      else { page = 'open'; }\n    } else if (page === 'open') {\n      page = 'results';\n    }\n    render();\n    if (page === 'results') setTimeout(drawRadar, 200);\n  });\n\n  document.querySelectorAll('.s-btn').forEach(btn => {\n    btn.addEventListener('click', function () {\n      const code = this.dataset.code, score = parseInt(this.dataset.score, 10);\n      this.closest('.scale-row').querySelectorAll('.s-btn').forEach(b => {\n        b.classList.remove('sel');\n        b.querySelector('.sticker').classList.remove('on');\n      });\n      this.classList.add('sel');\n      this.querySelector('.sticker').classList.add('on');\n      if (!answers[code]) answers[code] = {score:null, comment:''};\n      answers[code].score = score;\n      const ta = document.querySelector(`[data-ta=\"${code}\"]`);\n      if (ta) ta.style.display = 'block';\n      const card = document.getElementById('qc-'+code);\n      if (card) card.classList.add('answered');\n      // live progress update\n      const done = Object.values(answers).filter(a => a.score !== null).length;\n      const fill = document.querySelector('.eval-prog .fill');\n      if (fill) fill.style.width = Math.round(done/20*100)+'%';\n      const count = document.querySelector('.eval-prog .count');\n      if (count) count.textContent = done+' / 20';\n    });\n  });\n\n  document.querySelectorAll('[data-ta]').forEach(ta => {\n    ta.addEventListener('input', function () {\n      const code = this.dataset.ta;\n      if (!answers[code]) answers[code] = {score:null, comment:''};\n      answers[code].comment = this.value;\n    });\n  });\n\n  document.querySelectorAll('[data-open]').forEach(ta => {\n    ta.addEventListener('input', function () { openAns[this.dataset.open] = this.value; });\n  });\n}\n\n/* ─── RADAR CHART ─── */\nfunction drawRadar() {\n  const canvas = document.getElementById('radarCanvas');\n  if (!canvas) return;\n  const ctx = canvas.getContext('2d');\n  const SIZE = 480, dpr = window.devicePixelRatio || 1;\n  canvas.width = SIZE * dpr; canvas.height = SIZE * dpr;\n  canvas.style.width = SIZE + 'px'; canvas.style.height = SIZE + 'px';\n  ctx.scale(dpr, dpr);\n\n  const cx = SIZE/2, cy = SIZE/2, r = 144, labelR = r+34;\n  ctx.clearRect(0, 0, SIZE, SIZE);\n\n  // 4 dimension sectors arranged at cardinal points\n  const DIM_DEG = [270, 0, 90, 180]; // top, right, bottom, left\n  const SPREAD = 40, STEP = SPREAD/4;\n\n  const axes = [];\n  DIMS.forEach((dim, di) => {\n    for (let qi = 0; qi < 5; qi++) {\n      axes.push({\n        angle: (DIM_DEG[di] - SPREAD/2 + qi*STEP) * Math.PI/180,\n        code:  dim.qs[qi].code,\n        color: dim.hex,\n        dimIdx: di,\n      });\n    }\n  });\n\n  // concentric rings\n  for (let lvl = 1; lvl <= 5; lvl++) {\n    const fr = r * lvl / 5;\n    ctx.beginPath();\n    axes.forEach((ax, i) => {\n      const x = cx + fr*Math.cos(ax.angle), y = cy + fr*Math.sin(ax.angle);\n      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);\n    });\n    ctx.closePath();\n    ctx.strokeStyle = lvl === 5 ? 'rgba(0,0,0,.18)' : 'rgba(0,0,0,.06)';\n    ctx.lineWidth = lvl === 5 ? 1.2 : 0.8;\n    ctx.stroke();\n  }\n\n  // axes spokes\n  axes.forEach(ax => {\n    ctx.beginPath();\n    ctx.moveTo(cx, cy);\n    ctx.lineTo(cx + r*Math.cos(ax.angle), cy + r*Math.sin(ax.angle));\n    ctx.strokeStyle = 'rgba(0,0,0,.05)';\n    ctx.lineWidth = 0.7;\n    ctx.stroke();\n  });\n\n  // sector dividers\n  DIM_DEG.forEach(deg => {\n    const a = (deg+45) * Math.PI/180;\n    ctx.beginPath();\n    ctx.moveTo(cx, cy);\n    ctx.lineTo(cx + (r+8)*Math.cos(a), cy + (r+8)*Math.sin(a));\n    ctx.strokeStyle = 'rgba(0,0,0,.2)';\n    ctx.lineWidth = 1;\n    ctx.setLineDash([3, 6]);\n    ctx.stroke();\n    ctx.setLineDash([]);\n  });\n\n  // filled polygon — uses azul-marino with low alpha\n  const pts = axes.map(ax => {\n    const s = answers[ax.code]?.score || 0;\n    return {\n      x: cx + r*(s/5)*Math.cos(ax.angle),\n      y: cy + r*(s/5)*Math.sin(ax.angle),\n      score: s,\n      color: ax.color,\n    };\n  });\n\n  ctx.beginPath();\n  pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));\n  ctx.closePath();\n  ctx.fillStyle = 'rgba(65, 125, 213, 0.18)';\n  ctx.fill();\n  ctx.strokeStyle = '#005fa9';\n  ctx.lineWidth = 1.5;\n  ctx.stroke();\n\n  // colored dots at each vertex — uses the dim color (sticker style)\n  pts.forEach(p => {\n    ctx.beginPath();\n    ctx.arc(p.x, p.y, 6, 0, Math.PI*2);\n    ctx.fillStyle = p.color;\n    ctx.fill();\n    ctx.strokeStyle = '#fff';\n    ctx.lineWidth = 1.6;\n    ctx.stroke();\n  });\n\n  // per-question score labels at end of each spoke\n  axes.forEach(ax => {\n    const lx = cx + labelR*Math.cos(ax.angle), ly = cy + labelR*Math.sin(ax.angle);\n    const s = answers[ax.code]?.score || 0;\n    ctx.textAlign = 'center';\n    ctx.textBaseline = 'middle';\n    ctx.font = '600 9px \"SF UI Display\", sans-serif';\n    ctx.fillStyle = 'rgba(0,0,0,.4)';\n    ctx.fillText(ax.code, lx, ly - 7);\n    ctx.font = '800 13px \"SF UI Display\", sans-serif';\n    ctx.fillStyle = ax.color;\n    ctx.fillText(s, lx, ly + 7);\n  });\n\n  // dimension labels at outer ring — anchored to canvas edges so wide\n  // words (\"COMUNICACIÓN\", \"DECISIÓN\") never get clipped\n  const DL = [\n    {t:'Portafolio',   c:DIMS[0].hex},\n    {t:'Decisión',     c:DIMS[1].hex},\n    {t:'Sandbox',      c:DIMS[2].hex},\n    {t:'Comunicación', c:DIMS[3].hex},\n  ];\n  const labelPos = [\n    {x: cx,       y: 12,        align: 'center', baseline: 'top'},     // top (270)\n    {x: SIZE - 4, y: cy,        align: 'right',  baseline: 'middle'},  // right (0)\n    {x: cx,       y: SIZE - 12, align: 'center', baseline: 'bottom'},  // bottom (90)\n    {x: 4,        y: cy,        align: 'left',   baseline: 'middle'},  // left (180)\n  ];\n  ctx.font = '800 11px \"SF UI Display\", sans-serif';\n  DL.forEach((d, di) => {\n    const p = labelPos[di];\n    ctx.textAlign = p.align;\n    ctx.textBaseline = p.baseline;\n    ctx.fillStyle = d.c;\n    ctx.fillText(d.t.toUpperCase(), p.x, p.y);\n  });\n}\n\n/* ─── INIT ─── */\nrender();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
